name: meal_planner
description: Fridgenda - your personal meal planner.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.5
  path: ^1.9.0
  pdf: ^3.11.1
  printing: ^5.13.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/fridgenda.png"
  adaptive_icon_background: "#388E3C"
  adaptive_icon_foreground: "assets/icon/fridgenda.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
